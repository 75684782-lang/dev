name: appbanco_incasur_ventas
description: App Fuerza de Ventas - CRAC Incasur
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  supabase_flutter: ^2.5.3
  go_router: ^14.2.0
  # isar and isar_flutter_libs removed - using file-based persistence instead
  geolocator: ^11.0.0
  signature: ^5.4.0
  http: ^1.2.1
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  cupertino_icons: ^1.0.6
  path_provider: ^2.1.3
  image_picker: ^1.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  # isar_generator and build_runner removed - not needed

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png
    - assets/bg-login.png
